name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "README.md"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "README.md"
      - ".github/workflows/backend-ci.yml"

jobs:
  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: frontend-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements_test.txt
          pip install pytest

      - name: Run deterministic tests
        working-directory: backend
        env:
          FLASK_ENV: testing
        run: |
          pytest -q test_auth_direct.py test_database.py

  integration-postgres:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gestormei
          POSTGRES_USER: gestormei
          POSTGRES_PASSWORD: gestormei_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gestormei -d gestormei"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements_test.txt

      - name: Start API with PostgreSQL
        working-directory: backend
        env:
          FLASK_ENV: development
          FLASK_DEBUG: "False"
          DATABASE_URL: postgresql://gestormei:gestormei_password@localhost:5432/gestormei
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret-key
          LOG_LEVEL: INFO
        run: |
          nohup python run.py > /tmp/gestormei-api.log 2>&1 &
          echo $! > /tmp/gestormei-api.pid

      - name: Wait for API health
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:5000/health >/dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          tail -n 200 /tmp/gestormei-api.log || true
          exit 1

      - name: Run full API script
        working-directory: backend
        run: |
          timeout 240 python test_api.py

      - name: Print API logs on failure
        if: failure()
        run: |
          tail -n 300 /tmp/gestormei-api.log || true

      - name: Stop API process
        if: always()
        run: |
          if [ -f /tmp/gestormei-api.pid ]; then
            kill "$(cat /tmp/gestormei-api.pid)" || true
          fi
