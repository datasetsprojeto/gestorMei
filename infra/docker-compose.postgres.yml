version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gestormei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestormei
      POSTGRES_USER: gestormei
      POSTGRES_PASSWORD: gestormei_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestormei -d gestormei"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
